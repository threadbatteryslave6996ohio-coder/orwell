events {}

http {
    server {
        listen 8080;

        # Dashboard UI (Auth/Secrets/Klippy tabs)
        location /dashboard/ {
            proxy_pass http://127.0.0.1:9187/;
            proxy_set_header Host $host;
        }

        # Dashboard's own API calls are root-relative (/api/...), so they
        # land here regardless of the /dashboard/ prefix the page was loaded from.
        location /api/ {
            proxy_pass http://127.0.0.1:9187/api/;
            proxy_set_header Host $host;
        }

        # Raw service endpoints, one path per backend
        location /auth/ {
            proxy_pass http://127.0.0.1:8081/;
            proxy_set_header Host $host;
        }

        location /klippy/ {
            proxy_pass http://127.0.0.1:8082/;
            proxy_set_header Host $host;
        }

        location /secrets/ {
            proxy_pass http://127.0.0.1:8083/;
            proxy_set_header Host $host;
        }

        location /jarvis/ {
            proxy_pass http://127.0.0.1:8084/;
            proxy_set_header Host $host;
        }

        location /keeboarder/ {
            proxy_pass http://127.0.0.1:8025/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
