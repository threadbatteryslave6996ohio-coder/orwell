# Log analysis stack behind an internal Nginx proxy.
#
#   docker compose up --build
#
# This brings up the local alerting service, the log analyzer, and one published
# HTTP entrypoint. Point the analyzer at your Grafana instance and Loki
# datasource via the env file.

services:
  alerting:
    build:
      context: ../..
      dockerfile: apps/log-analyzer/Dockerfile
    container_name: log-analyzer-alerting
    command: ["java", "-jar", "/app/alerting.jar"]
    env_file:
      - ../alerting/.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 80
    restart: unless-stopped

  log-analyzer:
    build:
      context: ../..
      dockerfile: apps/log-analyzer/Dockerfile
    container_name: log-analyzer
    command: ["java", "-jar", "/app/log-analyzer.jar"]
    env_file:
      - ./.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 80
      ALERT_URL: http://alerting/alerts
    depends_on:
      - alerting
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - alerting
      - log-analyzer
    ports:
      - "${LOG_ANALYZER_HTTP_PORT:-9010}:80"
    volumes:
      - ./nginx/log-analyzer.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
