# Log analysis stack.
#
#   docker compose up --build
#
# This brings up the local alerting service and the log analyzer. Point the
# analyzer at your Grafana instance and Loki datasource via the env file.

services:
  alerting:
    build:
      context: ../..
      dockerfile: apps/log-analyzer/Dockerfile
    container_name: log-analyzer-alerting
    command: ["java", "-jar", "/app/alerting.jar"]
    env_file:
      - ../alerting/.env.example
    environment:
      ALERT_SERVER_HOST: 0.0.0.0
      ALERT_SERVER_PORT: 9000
    ports:
      - "9000:9000"
    restart: unless-stopped

  log-analyzer:
    build:
      context: ../..
      dockerfile: apps/log-analyzer/Dockerfile
    container_name: log-analyzer
    command: ["java", "-jar", "/app/log-analyzer.jar"]
    env_file:
      - ./.env.example
    environment:
      LOG_ANALYZER_SERVER_HOST: 0.0.0.0
      LOG_ANALYZER_SERVER_PORT: 9010
      ALERT_URL: http://alerting:9000/alerts
    ports:
      - "9010:9010"
    depends_on:
      - alerting
    restart: unless-stopped
