server {
    listen 80;
    listen [::]:80;
    server_name _;

    location = / {
        return 404;
    }

    location = /alerting {
        return 301 /alerting/;
    }

    location = /alerting/health {
        proxy_pass http://alerting:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /alerting/ {
        rewrite ^/alerting/?(.*)$ /$1 break;
        proxy_pass http://alerting:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /log-analyzer {
        return 301 /log-analyzer/;
    }

    location = /log-analyzer/health {
        proxy_pass http://log-analyzer:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /log-analyzer/ {
        rewrite ^/log-analyzer/?(.*)$ /$1 break;
        proxy_pass http://log-analyzer:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
