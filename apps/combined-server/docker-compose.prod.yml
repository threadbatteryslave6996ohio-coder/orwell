# Combined server — production deployment connecting to external databases.
#
#   docker compose -p prod -f docker-compose.prod.yml up -d
#
# Reads environment from .env.prod. No local databases are started;
# the server connects to the databases and Redis configured in .env.prod.

services:
  combined-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/combined-server.jar"]
    environment:
      COMBINED_SERVER_ENV_FILE: /app/config/combined.env
    volumes:
      - ./.env.prod:/app/config/combined.env:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
