# Combined server — production deployment connecting to Azure databases.
#
#   docker compose -f docker-compose.to-prd-db.yml up --build
#
# Requires a docker-combined.prod.env file with production credentials:
#
#   AUTH_DATASOURCE_URL=jdbc:postgresql://<auth-host>:5432/auth?sslmode=require
#   AUTH_DATASOURCE_USERNAME=<user>
#   AUTH_DATASOURCE_PASSWORD=<password>
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<clippy-host>:5432/clippy?sslmode=require
#   SPRING_DATASOURCE_USERNAME=<user>
#   SPRING_DATASOURCE_PASSWORD=<password>
#   REDIS_HOST=<redis-host>
#   REDIS_PORT=6379

services:
  combined-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: combined-server
    command: ["java", "-jar", "/app/combined-server.jar"]
    env_file:
      - docker-combined.prod.env
    ports:
      - "8080:8080"
    restart: unless-stopped
