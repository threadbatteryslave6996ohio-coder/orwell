# Combined server deployment — auth and clipboard routes in one JVM.
#
#   docker compose up --build
#
# Brings up two Postgres databases, Redis, and the combined server (port 8080).

services:
  db-clippy:
    image: postgres:16-alpine
    container_name: combined-db-clippy
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "5432:5432"
    volumes:
      - clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    container_name: combined-db-auth
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    volumes:
      - auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: combined-redis
    volumes:
      - keeboarder-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  combined-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: combined-server
    command: ["java", "-jar", "/app/combined-server.jar"]
    environment:
      COMBINED_SERVER_ENV_FILE: /app/config/combined.env
    volumes:
      - ./docker-combined.env:/app/config/combined.env:ro
    ports:
      - "8080:8080"
    depends_on:
      db-clippy:
        condition: service_healthy
      db-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clippy-pg-data:
  auth-pg-data:
  keeboarder-redis-data:
