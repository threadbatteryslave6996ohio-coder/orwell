services:
  proxy:
    image: jarvis-bucket-proxy:${PROXY_IMAGE_TAG:-local}
    build:
      # Build from the monorepo root so Maven can resolve sibling modules.
      context: ../../../../../..
      dockerfile: apps/jarvis/bucket/proxy/docker/deployment/Dockerfile
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: "0.0.0.0"
      SERVER_PORT: "5000"
      JARVIS_SERVER_ROUTE_PREFIX: ${JARVIS_SERVER_ROUTE_PREFIX:-/jarvis}
      PROXY_STORAGE_PROVIDER: ${PROXY_STORAGE_PROVIDER:-aws}
      PROXY_STORAGE_MAX_FILE_SIZE: ${PROXY_STORAGE_MAX_FILE_SIZE:-5368709120}

      PROXY_S3_BUCKET_NAME: ${PROXY_S3_BUCKET_NAME:-}
      PROXY_S3_REGION: ${PROXY_S3_REGION:-us-east-1}
      PROXY_S3_ENDPOINT: ${PROXY_S3_ENDPOINT:-}
      PROXY_S3_PATH_STYLE_ACCESS: ${PROXY_S3_PATH_STYLE_ACCESS:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT:-}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-}
      AZURE_STORAGE_ENDPOINT: ${AZURE_STORAGE_ENDPOINT:-}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}

      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://host.docker.internal:8081}
      AUTH_IDENTITY_PROVISIONING_KEY: ${AUTH_IDENTITY_PROVISIONING_KEY:-}
      PROXY_MANAGEMENT_USERNAME: ${PROXY_MANAGEMENT_USERNAME:-}
      PROXY_MANAGEMENT_PASSWORD: ${PROXY_MANAGEMENT_PASSWORD:-}
      PROXY_MANAGEMENT_SESSION_SECRET: ${PROXY_MANAGEMENT_SESSION_SECRET:-}
      PROXY_SERVER_URL: ${PROXY_SERVER_URL:-http://localhost:${JARVIS_HTTP_PORT:-5000}/jarvis}
      PROXY_CORS_ALLOWED_ORIGINS: ${PROXY_CORS_ALLOWED_ORIGINS:-}
      PROXY_LOGGING_AUDIT_FILE: /app/logs/audit.log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - proxy-audit-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "${JARVIS_HTTP_PORT:-5000}:80"
    volumes:
      - ./nginx/jarvis.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  proxy-audit-logs:
    name: jarvis-proxy-audit-logs
