proxy:
  s3:
    # S3-compatible endpoint (e.g. a self-hosted MinIO). Point this at your
    # bucket service; there is no default remote endpoint.
    endpoint: ""
  azure:
    # Optional. When blank, DefaultAzureCredential is used (managed identity,
    # Azure CLI, environment credentials, and other supported sources).
    connection-string: ""
  cors:
    allowed-origins: []
