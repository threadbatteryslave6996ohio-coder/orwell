# Klippy — production deployment connecting to external databases through an internal Nginx proxy.
#
#   docker compose -p prod -f docker-compose.prod.yml up -d
#
# Reads environment from .env.prod. No local databases are started;
# the servers connect to the databases configured in .env.prod.

services:
  auth-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    env_file:
      - .env.prod
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/klippy-server.jar"]
    env_file:
      - .env.prod
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_BASE_URL: http://auth-server/auth
    depends_on:
      auth-server:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
    ports:
      - "${KLIPPY_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/klippy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
