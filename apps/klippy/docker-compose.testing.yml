# Klippy — testing deployment with local databases.
#
#   docker compose -p testing -f docker-compose.testing.yml up --build -d
#
# Reads environment from .env.testing.
# Brings up two Postgres databases, the auth server (port 8081),
# and the clipboard server (port 8080).

services:
  # Postgres identifiers keep the historic "clippy" name — existing volumes/roles hold data (see CLAUDE.md).
  db-clippy:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "5432:5432"
    volumes:
      - testing-clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    volumes:
      - testing-auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    env_file:
      - .env.testing
    ports:
      - "8081:8081"
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/klippy-server.jar"]
    env_file:
      - .env.testing
    ports:
      - "8080:8080"
      - "8025:8025"
    depends_on:
      db-clippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

volumes:
  testing-clippy-pg-data:
  testing-auth-pg-data:
