# Clippy — testing deployment with local databases behind an internal Nginx proxy.
#
#   docker compose -p testing -f docker-compose.testing.yml up --build -d
#
# Reads environment from .env.testing.
# Brings up two Postgres databases plus one published HTTP entrypoint on port 8080.

services:
  db-clippy:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - testing-clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - testing-auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    env_file:
      - .env.testing
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_DATASOURCE_URL: jdbc:postgresql://db-auth/auth
      CLIPPY_AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/clippy-server.jar"]
    env_file:
      - .env.testing
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-clippy/clippy
      AUTH_BASE_URL: http://auth-server/auth
    depends_on:
      db-clippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
    ports:
      - "${CLIPPY_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/clippy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  testing-clippy-pg-data:
  testing-auth-pg-data:
