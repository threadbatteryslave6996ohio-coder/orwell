# Klippy — testing deployment with local databases behind an internal Nginx proxy.
#
#   docker compose -p testing -f docker-compose.testing.yml up --build -d
#
# Reads environment from .env.testing.
# Brings up two Postgres databases plus one published HTTP entrypoint on port 8080.

services:

  auth-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    mem_limit: 384m
    env_file:
      - .env.testing
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/auth
      AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/klippy-server.jar"]
    mem_limit: 384m
    env_file:
      - .env.testing
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/klippy
      AUTH_BASE_URL: http://auth-server/auth
    depends_on:
      auth-server:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
    ports:
      - "${KLIPPY_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/klippy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
