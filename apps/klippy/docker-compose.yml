# Clippy — separate auth and clipboard server deployment.
#
#   docker compose up --build
#
# Brings up two Postgres databases, the auth server (port 8081),
# and the clipboard server (port 8080).

services:
  db-clippy:
    image: postgres:16-alpine
    container_name: clippy-postgres
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "5432:5432"
    volumes:
      - clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    volumes:
      - auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: auth-server
    command: ["java", "-jar", "/app/auth-server.jar"]
    environment:
      AUTH_DATASOURCE_URL: jdbc:postgresql://db-auth:5432/auth
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth
      AUTH_SERVER_PORT: "8081"
      AUTH_LOGGING_FILE_NAME: logs/auth-server.log
      AUTH_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_JPA_JDBC_TIME_ZONE: UTC
    ports:
      - "8081:8081"
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: clippy-server
    command: ["java", "-jar", "/app/clippy-server.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-clippy:5432/clippy
      SPRING_DATASOURCE_USERNAME: clippy
      SPRING_DATASOURCE_PASSWORD: clippy
      SERVER_PORT: "8080"
      CLIPPY_AUTH_BASE_URL: http://auth-server:8081
      LOGGING_FILE_NAME: logs/clippy-server.log
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
    ports:
      - "8080:8080"
      - "8025:8025"
    depends_on:
      db-clippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

volumes:
  clippy-pg-data:
  auth-pg-data:
