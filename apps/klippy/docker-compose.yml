# Klippy — separate auth and clipboard server deployment behind an internal Nginx proxy.
#
#   docker compose up --build
#
# Brings up two Postgres databases plus one published HTTP entrypoint on port 8080.

services:
  db-klippy:
    image: postgres:16-alpine
    container_name: klippy-postgres
    environment:
      POSTGRES_DB: klippy
      POSTGRES_USER: klippy
      POSTGRES_PASSWORD: klippy
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - klippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klippy -d klippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: auth-server
    command: ["java", "-jar", "/app/auth-server.jar"]
    environment:
      AUTH_DATASOURCE_URL: jdbc:postgresql://db-auth/auth
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
      AUTH_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_JPA_JDBC_TIME_ZONE: UTC
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: klippy-server
    command: ["java", "-jar", "/app/klippy-server.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-klippy/klippy
      SPRING_DATASOURCE_USERNAME: klippy
      SPRING_DATASOURCE_PASSWORD: klippy
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_BASE_URL: http://auth-server/auth
      LOGGING_FILE_NAME: logs/klippy-server.log
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
    depends_on:
      db-klippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
    ports:
      - "${KLIPPY_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/klippy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  klippy-pg-data:
  auth-pg-data:
