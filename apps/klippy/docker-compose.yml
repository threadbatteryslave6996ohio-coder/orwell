# Clippy — full-stack docker compose.
#
# Pick the deployment shape with a compose PROFILE (this is the flag):
#
#   Separate deployment (auth server + clipboard server in their own JVMs):
#       docker compose --profile separate up --build
#
#   Combined deployment (auth + clipboard routes in one JVM, proxy launched as child process):
#       docker compose --profile combined up --build
#
#   (equivalently:  COMPOSE_PROFILES=separate docker compose up --build)
#
# Both profiles bring up the two Postgres databases. Running without a profile
# starts nothing, on purpose — you must choose combined or separate.

services:
  # --- Databases (shared by both deployment shapes) ------------------------
  db-clippy:
    image: postgres:16-alpine
    container_name: clippy-postgres
    profiles: ["separate", "combined"]
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "5432:5432"
    volumes:
      - clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    container_name: auth-postgres
    profiles: ["separate", "combined"]
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    volumes:
      - auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: keeboarder-redis
    profiles: ["combined"]
    volumes:
      - keeboarder-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Separate deployment -------------------------------------------------
  auth-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: auth-server
    profiles: ["separate"]
    command: ["java", "-jar", "/app/auth-server.jar"]
    environment:
      AUTH_DATASOURCE_URL: jdbc:postgresql://db-auth:5432/auth
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth
      AUTH_SERVER_PORT: "8081"
      AUTH_LOGGING_FILE_NAME: logs/auth-server.log
      AUTH_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_JPA_JDBC_TIME_ZONE: UTC
    ports:
      - "8081:8081"
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: clippy-server
    profiles: ["separate"]
    command: ["java", "-jar", "/app/clippy-server.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-clippy:5432/clippy
      SPRING_DATASOURCE_USERNAME: clippy
      SPRING_DATASOURCE_PASSWORD: clippy
      SERVER_PORT: "8080"
      CLIPPY_AUTH_BASE_URL: http://auth-server:8081
      LOGGING_FILE_NAME: logs/clippy-server.log
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
    ports:
      - "8080:8080"
      - "8025:8025"
    depends_on:
      db-clippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  # --- Combined deployment -------------------------------------------------
  combined-server:
    image: clippy-app:local
    build:
      context: ../..
      dockerfile: apps/klippy/Dockerfile
    container_name: combined-server
    profiles: ["combined"]
    command: ["java", "-jar", "/app/combined-server.jar"]
    # The combined launcher requires an env file; mount it and point at it.
    environment:
      COMBINED_SERVER_ENV_FILE: /app/config/combined.env
    volumes:
      - ../combined-server/docker-combined.env:/app/config/combined.env:ro
    ports:
      - "8080:8080"
    depends_on:
      db-clippy:
        condition: service_healthy
      db-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clippy-pg-data:
  auth-pg-data:
  keeboarder-redis-data:
