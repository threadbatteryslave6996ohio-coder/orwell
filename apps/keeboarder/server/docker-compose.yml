services:

  keeboarder-server:
    image: keeboarder-server:local
    build:
      context: ../../..
      dockerfile: apps/keeboarder/server/Dockerfile
    mem_limit: 256m
    env_file:
      - ./.env.example
    environment:
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8025"
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "6379"
      AUTH_BASE_URL: http://host.docker.internal:8081
      KEEBOARDER_SERVER_ROUTE_PREFIX: /keeboarder/api
      WEBSOCKET_CONTEXT_PATH: /keeboarder/ws
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      keeboarder-server:
        condition: service_started
    ports:
      - "${KEEBOARDER_HTTP_PORT:-8025}:80"
    volumes:
      - ./nginx/keeboarder.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
