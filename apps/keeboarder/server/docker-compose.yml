services:
  redis:
    image: redis:7-alpine
    container_name: keeboarder-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - keeboarder-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keeboarder-server:
    image: keeboarder-server:local
    build:
      context: ../../..
      dockerfile: apps/keeboarder/server/Dockerfile
    env_file:
      - ./.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8025"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_BASE_URL: http://host.docker.internal:8081
      KEEBOARDER_SERVER_ROUTE_PREFIX: /keeboarder/api
      WEBSOCKET_CONTEXT_PATH: /keeboarder/ws
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      keeboarder-server:
        condition: service_started
    ports:
      - "${KEEBOARDER_HTTP_PORT:-8025}:80"
    volumes:
      - ./nginx/keeboarder.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  keeboarder-redis-data:
