services:
  # One Postgres instance for the whole stack. It holds one database + login
  # role per app (klippy/auth/secrets), created by db-init/all-services.sql on
  # first start. Consolidated from three separate postgres containers — see
  # that file for the naming rationale.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - all-services-pg-data:/var/lib/postgresql/data
      - ./db-init/all-services.sql:/docker-entrypoint-initdb.d/all-services.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: klippy-app:local
    build:
      context: .
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    mem_limit: 384m
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      AUTH_DATASOURCE_URL: jdbc:postgresql://db/auth
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
      AUTH_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_JPA_JDBC_TIME_ZONE: UTC
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: .
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/klippy-server.jar"]
    mem_limit: 384m
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db/klippy
      SPRING_DATASOURCE_USERNAME: klippy
      SPRING_DATASOURCE_PASSWORD: klippy
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_BASE_URL: http://auth-server/auth
      LOGGING_FILE_NAME: logs/klippy-server.log
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
    depends_on:
      db:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  secrets-manager:
    image: secrets-manager-server:local
    build:
      context: .
      dockerfile: apps/secrets-manager/server/Dockerfile
    mem_limit: 384m
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SECRETS_DATASOURCE_URL: jdbc:postgresql://db/secrets
      SECRETS_DATASOURCE_USERNAME: secrets
      SECRETS_DATASOURCE_PASSWORD: secrets
      SECRETS_JPA_HIBERNATE_DDL_AUTO: update
      SECRETS_JPA_JDBC_TIME_ZONE: UTC
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8085"
      SECRETS_ROUTE_PREFIX: /secrets
      AUTH_BASE_URL: http://auth-server/auth
      LOGGING_FILE_NAME: logs/secrets-server.log
    depends_on:
      db:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  jarvis-proxy:
    image: jarvis-bucket-proxy:local
    build:
      context: .
      dockerfile: apps/jarvis/bucket/proxy/docker/deployment/Dockerfile
    env_file:
      - ./apps/jarvis/bucket/proxy/docker/deployment/.env.example
    mem_limit: 512m
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "5000"
      JARVIS_SERVER_ROUTE_PREFIX: /jarvis
      AUTH_BASE_URL: http://auth-server/auth
      PROXY_SERVER_URL: http://localhost:${ORWELL_HTTP_PORT:-8080}/jarvis
      PROXY_LOGGING_AUDIT_FILE: /app/logs/audit.log
    depends_on:
      auth-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  alerting:
    image: orwell-log-analyzer:local
    build:
      context: .
      dockerfile: apps/log-analyzer/Dockerfile
    command: ["java", "-jar", "/app/alerting.jar"]
    mem_limit: 256m
    env_file:
      - ./apps/alerting/.env.example
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
    restart: unless-stopped

  log-analyzer:
    image: orwell-log-analyzer:local
    build:
      context: .
      dockerfile: apps/log-analyzer/Dockerfile
    command: ["java", "-jar", "/app/log-analyzer.jar"]
    mem_limit: 256m
    env_file:
      - ./apps/log-analyzer/.env.example
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      ALERT_URL: http://alerting/alerts
    depends_on:
      - alerting
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - all-services-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keeboarder-server:
    image: keeboarder-server:local
    build:
      context: .
      dockerfile: apps/keeboarder/server/Dockerfile
    env_file:
      - ./apps/keeboarder/server/.env.example
    mem_limit: 256m
    environment:
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_TENANT_ID: "${LOKI_TENANT_ID:-}"
      JAVA_TOOL_OPTIONS: "-XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=75.0"
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8025"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_BASE_URL: http://auth-server/auth
      KEEBOARDER_SERVER_ROUTE_PREFIX: /keeboarder/api
      WEBSOCKET_CONTEXT_PATH: /keeboarder/ws
    depends_on:
      auth-server:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
      secrets-manager:
        condition: service_started
      jarvis-proxy:
        condition: service_healthy
      alerting:
        condition: service_started
      keeboarder-server:
        condition: service_started
      log-analyzer:
        condition: service_started
    ports:
      - "${ORWELL_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/all-services.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  all-services-pg-data:
  all-services-proxy-audit-logs:
  all-services-redis-data:
