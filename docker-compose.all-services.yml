services:
  db-clippy:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clippy
      POSTGRES_USER: clippy
      POSTGRES_PASSWORD: clippy
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - all-services-clippy-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippy -d clippy"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - all-services-auth-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-secrets:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secrets
      POSTGRES_USER: secrets
      POSTGRES_PASSWORD: secrets
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - all-services-secrets-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secrets -d secrets"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-server:
    image: klippy-app:local
    build:
      context: .
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/auth-server.jar"]
    environment:
      AUTH_DATASOURCE_URL: jdbc:postgresql://db-auth/auth
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      CLIPPY_AUTH_ROUTE_PREFIX: /auth
      LOGGING_FILE_NAME: logs/auth-server.log
      AUTH_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_JPA_JDBC_TIME_ZONE: UTC
    depends_on:
      db-auth:
        condition: service_healthy
    restart: unless-stopped

  clipboard-server:
    image: klippy-app:local
    build:
      context: .
      dockerfile: apps/klippy/Dockerfile
    command: ["java", "-jar", "/app/klippy-server.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-clippy/clippy
      SPRING_DATASOURCE_USERNAME: clippy
      SPRING_DATASOURCE_PASSWORD: clippy
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      AUTH_BASE_URL: http://auth-server/auth
      LOGGING_FILE_NAME: logs/klippy-server.log
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
    depends_on:
      db-clippy:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  secrets-manager:
    image: secrets-manager-server:local
    build:
      context: .
      dockerfile: apps/secrets-manager/server/Dockerfile
    environment:
      SECRETS_DATASOURCE_URL: jdbc:postgresql://db-secrets/secrets
      SECRETS_DATASOURCE_USERNAME: secrets
      SECRETS_DATASOURCE_PASSWORD: secrets
      SECRETS_JPA_HIBERNATE_DDL_AUTO: update
      SECRETS_JPA_JDBC_TIME_ZONE: UTC
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8085"
      SECRETS_ROUTE_PREFIX: /secrets
      AUTH_BASE_URL: http://auth-server/auth
      LOGGING_FILE_NAME: logs/secrets-server.log
    depends_on:
      db-secrets:
        condition: service_healthy
      auth-server:
        condition: service_started
    restart: unless-stopped

  jarvis-proxy:
    image: jarvis-bucket-proxy:local
    build:
      context: .
      dockerfile: apps/jarvis/bucket/proxy/docker/deployment/Dockerfile
    env_file:
      - ./apps/jarvis/bucket/proxy/docker/deployment/.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "5000"
      JARVIS_SERVER_ROUTE_PREFIX: /jarvis
      AUTH_BASE_URL: http://auth-server/auth
      PROXY_SERVER_URL: http://localhost:${ORWELL_HTTP_PORT:-8080}/jarvis
      PROXY_LOGGING_AUDIT_FILE: /app/logs/audit.log
    volumes:
      - all-services-proxy-audit-logs:/app/logs
    depends_on:
      auth-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  alerting:
    image: orwell-log-analyzer:local
    build:
      context: .
      dockerfile: apps/log-analyzer/Dockerfile
    command: ["java", "-jar", "/app/alerting.jar"]
    env_file:
      - ./apps/alerting/.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
    restart: unless-stopped

  log-analyzer:
    image: orwell-log-analyzer:local
    build:
      context: .
      dockerfile: apps/log-analyzer/Dockerfile
    command: ["java", "-jar", "/app/log-analyzer.jar"]
    env_file:
      - ./apps/log-analyzer/.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "80"
      ALERT_URL: http://alerting/alerts
    depends_on:
      - alerting
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - all-services-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keeboarder-server:
    image: keeboarder-server:local
    build:
      context: .
      dockerfile: apps/keeboarder/server/Dockerfile
    env_file:
      - ./apps/keeboarder/server/.env.example
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: "8025"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_BASE_URL: http://auth-server/auth
      KEEBOARDER_SERVER_ROUTE_PREFIX: /keeboarder/api
      WEBSOCKET_CONTEXT_PATH: /keeboarder/ws
    depends_on:
      auth-server:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth-server:
        condition: service_started
      clipboard-server:
        condition: service_started
      secrets-manager:
        condition: service_started
      jarvis-proxy:
        condition: service_healthy
      alerting:
        condition: service_started
      keeboarder-server:
        condition: service_started
      log-analyzer:
        condition: service_started
    ports:
      - "${ORWELL_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/all-services.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  all-services-clippy-pg-data:
  all-services-auth-pg-data:
  all-services-secrets-pg-data:
  all-services-proxy-audit-logs:
  all-services-redis-data:
